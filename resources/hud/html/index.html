<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlackList HUD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HUD: only visible in freeroam/match -->
    <div id="hud" class="hidden">
        <!-- Styled frame around the minimap -->
        <div class="minimap-frame">
            <div class="frame-left"></div>
            <div class="frame-bottom"></div>
            <div class="frame-corner-bl"></div>
            <div class="frame-corner-tl"></div>
            <div class="frame-corner-br"></div>
        </div>

        <!-- Speed panel below minimap -->
        <div class="speed-panel">
            <div class="speed-row">
                <span class="speed-value" id="speedValue">0</span>
                <span class="speed-unit">KM/H</span>
            </div>
            <div class="gear-row">
                <div class="rpm-bar">
                    <div class="rpm-fill" id="rpmFill"></div>
                </div>
                <span class="gear-value" id="gearValue">N</span>
            </div>
        </div>

        <!-- Tier badge (top-left of minimap) -->
        <div class="hud-tier" id="hudTier">
            <span class="hud-tier-letter" id="hudTierLetter">B</span>
        </div>

        <!-- Chat overlay (top-left) -->
        <div class="chat-overlay" id="chatOverlay">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-wrap hidden" id="chatInputWrap">
                <span class="chat-input-label">CHAT</span>
                <input type="text" id="chatInput" class="chat-input" placeholder="Type a message..." maxlength="256" autocomplete="off">
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
