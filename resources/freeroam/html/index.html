<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Roam Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Hint -->
    <div class="hint hidden" id="hint">
        <span class="hint-key">ESC</span>
        <span class="hint-text">or</span>
        <span class="hint-key">F1</span>
        <span class="hint-text">Free Roam Menu</span>
    </div>

    <!-- Mini menu panel -->
    <div class="freeroam-menu hidden" id="freeroamMenu">
        <div class="fm-header">
            <h2>FREE ROAM</h2>
            <button class="fm-close" id="btnClose">&times;</button>
        </div>

        <div class="fm-section">
            <h3>SELECT CAR</h3>
            <div class="fm-search">
                <input type="text" id="carSearch" placeholder="Search vehicles..." autocomplete="off">
            </div>
            <div class="fm-car-list" id="carList"></div>
        </div>

        <div class="fm-section">
            <h3>ACTIONS</h3>
            <div class="fm-actions">
                <button class="fm-btn fm-btn-teleport" id="btnTeleport">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                    TELEPORT TO GPS
                </button>
                <button class="fm-btn fm-btn-back" id="btnBack">
                    <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                    BACK TO MENU
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
