<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chase HUD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Countdown overlay -->
    <div class="countdown-overlay hidden" id="countdownOverlay">
        <div class="countdown-number" id="countdownNumber">3</div>
    </div>

    <!-- Role announcement -->
    <div class="role-announce hidden" id="roleAnnounce">
        <div class="role-text" id="roleText">CHASER</div>
        <div class="role-sub" id="roleSub">Catch the runner!</div>
    </div>

    <!-- Head start banner -->
    <div class="headstart-banner hidden" id="headstartBanner">
        <span id="headstartText">Runner head start: 5s</span>
    </div>

    <!-- Main HUD -->
    <div class="chase-hud hidden" id="chaseHud">
        <div class="hud-top">
            <div class="hud-timer" id="hudTimer">5:00</div>
            <div class="hud-role" id="hudRole">CHASER</div>
        </div>
        <div class="hud-distance" id="hudDistance">
            <span class="distance-value" id="distanceValue">---</span>
            <span class="distance-unit">m</span>
        </div>
    </div>

    <!-- Catch/Escape progress bar -->
    <div class="progress-container hidden" id="progressContainer">
        <div class="progress-label" id="progressLabel">CATCHING</div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-time" id="progressTime">0.0s</div>
    </div>

    <!-- Warning popup -->
    <div class="warning-popup hidden" id="warningPopup">
        <span id="warningText"></span>
    </div>

    <!-- Terrain countdown (subtle, bottom-right) -->
    <div class="terrain-warning hidden" id="terrainWarning">
        <span class="terrain-icon">⚠</span>
        <span id="terrainCountdown">10</span>
    </div>

    <!-- Match end overlay -->
    <div class="match-end hidden" id="matchEnd">
        <div class="end-result" id="endResult">ESCAPED!</div>
        <div class="end-details" id="endDetails"></div>

        <div class="mmr-section hidden" id="mmrSection">
            <div class="mmr-placement hidden" id="mmrPlacement">PLACEMENT 1/3</div>
            <div class="mmr-row">
                <span class="mmr-label">ELO</span>
                <span class="mmr-value" id="mmrValue">500</span>
                <span class="mmr-change" id="mmrChange">+25</span>
            </div>
        </div>

        <div class="rank-change hidden" id="rankChange">
            <div class="rank-change-text" id="rankChangeText">PROMOTED TO GOLD</div>
        </div>

        <div class="rematch-area hidden" id="rematchArea">
            <button class="rematch-btn" id="rematchBtn">REMATCH</button>
            <div class="rematch-status hidden" id="rematchStatus"></div>
        </div>

        <div class="end-returning" id="endReturning">Returning to menu...</div>
    </div>

    <script src="hud.js"></script>
</body>
</html>
