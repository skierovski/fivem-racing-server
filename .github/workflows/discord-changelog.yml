name: Discord Changelog

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build changelog and post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          PUSHER="${{ github.actor }}"
          BRANCH="${{ github.ref_name }}"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            COMMITS=$(git log --oneline -10 "$AFTER")
          else
            COMMITS=$(git log --oneline "$BEFORE".."$AFTER")
          fi

          LINES=""
          while IFS= read -r line; do
            if [ -n "$line" ]; then
              HASH=$(echo "$line" | cut -d' ' -f1)
              MSG=$(echo "$line" | cut -d' ' -f2-)
              LINES="${LINES}$(printf '\u2022') \`${HASH}\` ${MSG}"$'\n'
            fi
          done <<< "$COMMITS"

          if [ -z "$LINES" ]; then
            LINES="Brak nowych commitow"
          fi

          MENTION="<@&1477347394600308972>"
          DESC=$(printf "%s\n\n%s\n_Wyslane przez **%s** na \`%s\` -- %s_" "$MENTION" "$LINES" "$PUSHER" "$BRANCH" "$TIMESTAMP")

          jq -n \
            --arg content "$MENTION" \
            --arg desc "$DESC" \
            '{
              content: $content,
              allowed_mentions: { roles: ["1477347394600308972"] },
              embeds: [{
                title: "Changelog - Racing Server",
                description: $desc,
                color: 3447003
              }]
            }' | curl -sf -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
