name: Discord Changelog

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Post changelog to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::error::Secret DISCORD_WEBHOOK_URL is not set"
            exit 1
          fi

          if [ ! -f "CHANGELOG_NEXT.md" ]; then
            echo "No CHANGELOG_NEXT.md found, skipping Discord post"
            exit 0
          fi

          CONTENT=$(cat CHANGELOG_NEXT.md)

          if [ -z "$CONTENT" ]; then
            echo "CHANGELOG_NEXT.md is empty, skipping"
            exit 0
          fi

          MENTION="<@&1477347394600308972>"
          TODAY=$(date -u +"%d.%m.%Y")
          TITLE="BlackList Racing : Changelog ${TODAY}"

          jq -n \
            --arg content "$MENTION" \
            --arg desc "$CONTENT" \
            --arg title "$TITLE" \
            '{
              content: $content,
              allowed_mentions: { roles: ["1477347394600308972"] },
              embeds: [{
                title: $title,
                description: $desc,
                color: 3447003
              }]
            }' > /tmp/payload.json

          echo "Posting to Discord..."
          HTTP_CODE=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json \
            "$WEBHOOK_URL")

          echo "HTTP: $HTTP_CODE"
          cat /tmp/response.txt
          echo ""

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Discord returned HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Changelog posted!"
